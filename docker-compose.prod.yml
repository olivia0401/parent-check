# Production stack for a single always-on server (one small AWS EC2), mirroring
# the AI-Job-Scout deploy: docker compose + Caddy auto-HTTPS. Real Postgres/
# pgvector + Redis run alongside the app — not a degraded demo.
#
#   1. copy .env.prod.example -> .env  and fill it in
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# Unlike the dev docker-compose.yml, this does NOT publish the db/redis ports to
# the host (only Caddy is public, on 80/443), sets restart policies, and reads
# every secret from .env.
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"          # internal only; Caddy reaches it as web:8000
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SITE_URL: "https://${SITE_ADDRESS}"   # for absolute og:/twitter: share links; reuses SITE_ADDRESS
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  pgdata:
  caddy_data:
  caddy_config:
