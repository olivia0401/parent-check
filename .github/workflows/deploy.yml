name: Deploy to Amazon ECS

# CI/CD: on every push to main, build the container, push it to Amazon ECR,
# and trigger a new deployment of the ECS Express (Fargate) service.
on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  id-token: write           # required to request the OIDC token for AWS
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPO: parent-check
  ECS_CLUSTER: default
  ECS_SERVICE: parent-check
  # OIDC role created in AWS (no long-lived keys stored in GitHub).
  ROLE_ARN: arn:aws:iam::378970972471:role/github-actions-parent-check-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPO:latest" \
            -t "$REGISTRY/$ECR_REPO:${{ github.sha }}" .
          docker push "$REGISTRY/$ECR_REPO:latest"
          docker push "$REGISTRY/$ECR_REPO:${{ github.sha }}"

      - name: Trigger ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION" \
            --query 'service.serviceName' --output text
