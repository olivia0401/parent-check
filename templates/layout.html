<!DOCTYPE html>
<!-- layout.html: shared page frame. Other templates fill the main block. -->
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ t.brand }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <header>
      <a class="brand" href="{{ url_for('index') }}">{{ t.brand }}</a>
      <nav>
        <a href="{{ url_for('index') }}">{{ t.nav_home }}</a>
        <a href="{{ url_for('history') }}">{{ t.nav_history }}</a>
        <a href="{{ url_for('about') }}">{{ t.nav_about }}</a>
        <!-- language toggle: switch language and return to the home page -->
        <a class="lang" href="{{ url_for('index', lang=t.other_lang) }}"
          >{{ t.other_lang_name }}</a
        >
      </nav>
    </header>

    <main>{% block main %}{% endblock %}</main>

    <footer>
      <p>{{ t.footer }}</p>
      <p><a href="{{ url_for('privacy') }}">{{ t.nav_privacy }}</a></p>
    </footer>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
