<!DOCTYPE html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ t.brand }}</title>
    <meta name="description" content="{{ t.home_lead }}" />
    <!-- Open Graph / social share preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="{{ t.brand }}" />
    <meta property="og:title" content="{{ t.brand }} · {{ t.home_title }}" />
    <meta property="og:description" content="{{ t.home_lead }}" />
    <meta property="og:url" content="{{ site_url }}{{ request.path }}" />
    <meta property="og:image" content="{{ site_url }}/static/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="{{ 'zh_CN' if lang == 'zh' else 'en_GB' }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ t.brand }} · {{ t.home_title }}" />
    <meta name="twitter:description" content="{{ t.home_lead }}" />
    <meta name="twitter:image" content="{{ site_url }}/static/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <header>
      <a class="brand" href="{{ url_for('index') }}">
        <svg class="brand-mark" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2.5 4.5 5.5v6c0 4.4 3.2 8.2 7.5 9.5 4.3-1.3 7.5-5.1 7.5-9.5v-6L12 2.5Z" fill="#1a5c9c"/>
          <path d="m8.7 12.1 2.3 2.3 4.3-4.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        {{ t.brand }}</a>
      <nav>
        <a href="{{ url_for('index') }}">{{ t.nav_home }}</a>
        <a href="{{ url_for('history') }}">{{ t.nav_history }}</a>
        <a href="{{ url_for('about') }}">{{ t.nav_about }}</a>
        <!-- language toggle: switch language and return to the home page -->
        <a class="lang" href="{{ url_for('index', lang=t.other_lang) }}"
          >{{ t.other_lang_name }}</a
        >
      </nav>
    </header>

    <main>{% block main %}{% endblock %}</main>

    <footer>
      <p>{{ t.footer }}</p>
      <p><a href="{{ url_for('privacy') }}">{{ t.nav_privacy }}</a></p>
    </footer>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
