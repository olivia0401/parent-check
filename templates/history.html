{% extends "layout.html" %}

{% block main %}
  <h1>{{ t.history_title }}</h1>
  <p class="trust">{{ t.history_note }}</p>

  {% if rows %}
    <ul class="history">
      {% for row in rows %}
        <li>
          <a href="{{ url_for('detail', check_id=row['id']) }}">
            <span class="when">{{ row['created_at'] }}</span>
            <span class="src">{{ t.sources[row['source']] }}</span>
            <span class="badge {{ row['risk'] }}">{{ t.risk[row['risk']] }}</span>
          </a>
        </li>
      {% endfor %}
    </ul>

    <form
      action="{{ url_for('clear_history') }}"
      method="post"
      onsubmit="return confirm('{{ t.history_clear_confirm }}')"
    >
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <button type="submit" class="link-button">{{ t.history_clear }}</button>
    </form>
  {% else %}
    <p class="lead">{{ t.history_empty }}</p>
  {% endif %}
{% endblock %}
